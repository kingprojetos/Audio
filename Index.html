<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Veja isso 😳</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body style="margin:0; display:flex; justify-content:center; align-items:center; height:100vh; background:black; color:white; font-family:sans-serif;">

  <h1>CLIQUE PARA VER 👀</h1>

  <audio id="audio">
    <source src="audio/gemido.mp3" type="audio/mpeg">
  </audio>

  <script>
    const audio = document.getElementById("audio");

    // tenta autoplay
    window.onload = () => {
      audio.play().catch(() => {});
    };

    // garante no clique
    document.body.addEventListener("click", () => {
      audio.play();
    });
  </script>

</body>
</html>
